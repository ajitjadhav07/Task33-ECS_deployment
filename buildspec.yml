version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 989615686095.dkr.ecr.ap-south-1.amazonaws.com

  build:
    commands:
      - echo Building the Docker image...
      - docker build -t my-app .
      - docker tag my-app:latest 989615686095.dkr.ecr.ap-south-1.amazonaws.com/my-app:latest

  post_build:
    commands:
      - echo Pushing the Docker image...
      - docker push 989615686095.dkr.ecr.ap-south-1.amazonaws.com/my-app:latest
      - echo Writing imagedefinitions.json file...
      - printf '[{"name":"my-app","imageUri":"%s"}]' 989615686095.dkr.ecr.ap-south-1.amazonaws.com/my-app:latest > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
